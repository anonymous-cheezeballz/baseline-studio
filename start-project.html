<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Start a Project — Baseline Studio</title>
    <meta
      name="description"
      content="Start a project with Baseline Studio — request a quote for a clean, engineered website."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="Baseline Studio home">
          <img
            src="./assets/images/baseline-studio-logo-blk.svg"
            alt="Baseline Studio logo"
          />
        </a>

        <button class="nav-toggle" aria-label="Open menu" aria-expanded="false" type="button">
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
        </button>

        <nav class="site-nav" aria-label="Primary">
          <a class="nav-link is-active" href="#start-project-form" aria-current="page">Start a Project</a>
          <a class="nav-link" href="./portfolio.html">Portfolio</a>
          <a class="nav-link" href="./about.html">About</a>
        </nav>
      </div>
    </header>

    <main id="main">
      <!-- Start Project Hero -->
      <section class="sp-hero" aria-labelledby="sp-hero-title">
        <div class="sp-hero__inner container">
          <p class="sp-hero__eyebrow">Start a project</p>

          <h1 id="sp-hero-title" class="sp-hero__title">
            A clean website, built to ship.
          </h1>
        </div>
      </section>

      <!-- Start Project Form -->
      <section
        class="sp-form"
        id="start-project-form"
        aria-labelledby="sp-form-title"
      >
        <div class="sp-form__inner container">
          <header class="sp-form__header">
            <h2 id="sp-form-title" class="sp-form__title">Request a quote</h2>
            <p class="sp-form__lead">
              Share a few details and we’ll follow up with next steps and pricing.
            </p>
          </header>

          <form
            class="sp-form__card"
          >
            <input
              type="text"
              name="_gotcha"
              style="display: none"
              tabindex="-1"
              autocomplete="off"
            />

            <div class="sp-form__grid">
              <div class="sp-field">
                <label class="sp-label" for="sp-name">Name</label>
                <input
                  class="sp-input"
                  id="sp-name"
                  name="name"
                  type="text"
                  required
                  placeholder="Your name"
                  autocomplete="name"
                />
              </div>

              <div class="sp-field">
                <label class="sp-label" for="sp-email">Email</label>
                <input
                  class="sp-input"
                  id="sp-email"
                  name="email"
                  type="email"
                  required
                  placeholder="you@company.com"
                  autocomplete="email"
                  inputmode="email"
                />
              </div>

              <div class="sp-field sp-field--full">
                <label class="sp-label" for="sp-business">Business name</label>
                <input
                  class="sp-input"
                  id="sp-business"
                  name="businessName"
                  type="text"
                  required
                  placeholder="Your business or project name"
                  autocomplete="organization"
                />
              </div>

              <div class="sp-field sp-field--full">
                <label class="sp-label" for="sp-message">Brief project details</label>
                <textarea
                  class="sp-textarea"
                  id="sp-message"
                  name="projectDetails"
                  rows="5"
                  required
                  placeholder="Tell us a little about your business, what you need, and anything you already have in mind."
                ></textarea>
              </div>
            </div>

            <div class="sp-form__footer">
              <button class="sp-submit" type="submit">Request a quote</button>
            </div>
          </form>
        </div>
      </section>
    </main>
    <footer class="site-footer">
      <div class="container">
        <p>© Baseline Studio 2026</p>
      </div>
    </footer>
    
    <!-- Scripts -->
    <script src="./script.js" defer></script>
  </body>
</html>
